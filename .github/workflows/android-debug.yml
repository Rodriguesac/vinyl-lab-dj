name: Gerar APK Debug

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Preparar Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Preparar SDK Android
        uses: android-actions/setup-android@v3

      - name: Instalar Android API 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Preparar Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Montar APK debug
        run: gradle :app:assembleDebug --stacktrace

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: VinylLab-DJ-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
